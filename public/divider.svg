<svg viewBox="0 0 800 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes line-glow {
      0% { opacity: 0.5; stroke-width: 1; }
      50% { opacity: 1; stroke-width: 2; }
      100% { opacity: 0.5; stroke-width: 1; }
    }
  </style>
  <path d="M10 10 H790" stroke="url(#cyan-purple-grad-div)" stroke-linecap="round" stroke-width="1.5" style="animation: line-glow 3s infinite ease-in-out;" />
  <circle cx="400" cy="10" r="4" fill="#8b5cf6" filter="url(#glow-div)" />
  <circle cx="400" cy="10" r="1.5" fill="#0ea5e9" />
  <defs>
    <linearGradient id="cyan-purple-grad-div" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0" />
      <stop offset="25%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="75%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0" />
    </linearGradient>
    <filter id="glow-div">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
