<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="300" height="150">
  <defs>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse-wave {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    .grid-lines {
      stroke: rgba(255, 255, 255, 0.04);
      stroke-width: 1;
    }
    .heartbeat-line {
      fill: none;
      stroke: url(#green-gradient);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 600;
      animation: pulse-wave 4s linear infinite;
      filter: url(#glow);
    }
  </style>
  <!-- Background Grid -->
  <path d="M0 25 H300 M0 50 H300 M0 75 H300 M0 100 H300 M0 125 H300" class="grid-lines" />
  <path d="M50 0 V150 M100 0 V150 M150 0 V150 M200 0 V150 M250 0 V150" class="grid-lines" />
  <!-- Heartbeat ECG line -->
  <path d="M0 75 H60 L70 50 L80 100 L90 20 L100 120 L110 75 H160 L170 50 L180 100 L190 20 L200 120 L210 75 H300" class="heartbeat-line" />
</svg>
