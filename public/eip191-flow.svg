<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes key-slide {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes lock-shack {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(2deg); }
    }
    .sign-lock {
      transform-origin: 100px 110px;
      animation: lock-shack 3s ease-in-out infinite;
      fill: rgba(15, 23, 42, 0.75);
      stroke: url(#purple-glow);
      stroke-width: 3;
      filter: url(#glow-filter);
    }
    .sign-key {
      transform-origin: 100px 100px;
      animation: key-slide 3s ease-in-out infinite;
      fill: none;
      stroke: #f59e0b;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px #f59e0b);
    }
  </style>
  <!-- Lock Shackle -->
  <path d="M70 100 V75 C70 55 130 55 130 75 V100" fill="none" stroke="url(#purple-glow)" stroke-width="3" stroke-linecap="round" />
  <!-- Lock Body -->
  <rect x="55" y="100" width="90" height="70" rx="12" class="sign-lock" />
  <!-- Keyhole / Signature Line -->
  <circle cx="100" cy="130" r="6" fill="#fff" opacity="0.8" />
  <path d="M100 136 V150" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  <!-- Floating Key -->
  <g class="sign-key">
    <circle cx="100" cy="50" r="10" />
    <path d="M100 60 V85" />
    <path d="M100 75 H112" />
    <path d="M100 82 H112" />
  </g>
</svg>
