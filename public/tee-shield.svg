<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(14, 165, 233, 0.4)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.8)) drop-shadow(0 0 25px rgba(139, 92, 246, 0.5)); }
    }
    @keyframes rotate-ring {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .shield-body {
      transform-origin: 100px 100px;
      animation: pulse 4s ease-in-out infinite;
      fill: rgba(15, 23, 42, 0.6);
      stroke: url(#neon-glow);
      stroke-width: 3;
      filter: url(#blur);
    }
    .orbit-ring {
      transform-origin: 100px 100px;
      animation: rotate-ring 12s linear infinite;
      fill: none;
      stroke: rgba(139, 92, 246, 0.3);
      stroke-width: 1.5;
      stroke-dasharray: 6 12;
    }
    .orbit-dot {
      fill: #10b981;
      filter: drop-shadow(0 0 5px #10b981);
    }
  </style>
  <circle cx="100" cy="100" r="85" class="orbit-ring" />
  <circle cx="100" cy="15" r="4" class="orbit-dot" />
  <path d="M100 35 L155 50 C155 105 135 140 100 165 C65 140 45 105 45 50 Z" class="shield-body" />
  <path d="M100 60 L135 70 C135 110 120 135 100 150 C80 135 65 110 65 70 Z" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
</svg>
